<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author | default: 'Hekate' }}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Prism.js for code highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  
  <!-- Main stylesheet -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="lp-bg" aria-hidden="true">
    <canvas id="lowpolyCanvas" class="lp-canvas"></canvas>
    <span class="lp-grid"></span>
  </div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <span class="nav-logo-mark" aria-hidden="true"></span>
        黑棘实验室
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/" class="{% if page.url == '/' %}active{% endif %}">首页</a></li>
        <li><a href="/blog/" class="{% if page.url contains '/blog/' %}active{% endif %}">研究日志</a></li>
        <li><a href="/projects/" class="{% if page.url contains '/projects/' %}active{% endif %}">项目</a></li>
        <li><a href="/about/" class="{% if page.url == '/about/' %}active{% endif %}">关于</a></li>
      </ul>
    </div>
  </nav>

  <!-- Mobile nav overlay -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Main content -->
  <main class="main-content">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-links">
        <a href="https://github.com/noir-hedgehog" target="_blank" rel="noopener" class="github-link">
          <svg height="20" width="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/></svg>
          GitHub 仓库
        </a>
      </div>
      <p class="footer-copy">© 2026 黑棘实验室（Noir Hedgehog Lab）</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="/assets/js/main.js"></script>
</body>
</html>
